apiVersion: apps/v1
kind: Deployment
metadata:
  name: salesflow-api
  labels:
    app: salesflow-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: salesflow-api
  template:
    metadata:
      labels:
        app: salesflow-api
    spec:
      containers:
        - name: api
          image: salesflow-api:latest
          imagePullPolicy: Never
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres-service:5432/salesflow_crm_db
            - name: SPRING_DATASOURCE_USERNAME
              value: postgres
            - name: SPRING_DATASOURCE_PASSWORD
              value: postgres
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: kafka-service:9092
            - name: SPRING_KAFKA_LISTENER_AUTO_STARTUP
              value: "false"
          ports:
            - containerPort: 8081
---
apiVersion: v1
kind: Service
metadata:
  name: api-service
spec:
  selector:
    app: salesflow-api
  ports:
    - protocol: TCP
      port: 8081
      targetPort: 8081
  type: LoadBalancer
